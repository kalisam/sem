name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: sem-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: sem-linux-arm64
            cross_package: gcc-aarch64-linux-gnu
            cross_linker: aarch64-linux-gnu-gcc
          - target: aarch64-apple-darwin
            os: macos-14
            name: sem-darwin-arm64

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: crates

    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilation toolchain
        if: matrix.cross_package != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cross_package }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Configure cargo for cross-compilation
        if: matrix.cross_linker != ''
        run: |
          mkdir -p ~/.cargo
          echo "[target.${{ matrix.target }}]" >> ~/.cargo/config.toml
          echo "linker = \"${{ matrix.cross_linker }}\"" >> ~/.cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p sem-cli

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz sem
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: crates/${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
